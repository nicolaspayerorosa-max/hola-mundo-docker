version: "3.8"

services:
  web:
    build: ./src
    container_name: aplicacion_flask
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - red_app

  mysql:
    image: mysql:8.0
    container_name: servidor_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hola_mundo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - red_app

volumes:
  mysql_data:

networks:
  red_app: